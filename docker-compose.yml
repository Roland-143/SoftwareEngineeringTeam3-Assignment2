name: ${COMPOSE_PROJECT_NAME:-course-project2}

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      # Fail fast if required secrets are missing from .env.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${APP_DB_NAME:-course_management}
      MYSQL_USER: ${APP_DB_USER:-studentapp}
      MYSQL_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  backend:
    profiles: ["scaffold"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${APP_DB_NAME:-course_management}
      DB_USER: ${APP_DB_USER:-studentapp}
      DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}
    volumes:
      - ./backend:/workspace
    command: sh -c "echo 'Backend skeleton container is running. Replace backend/Dockerfile and add your backend project files when stack is selected.' && sleep infinity"

  frontend:
    profiles: ["scaffold"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    working_dir: /workspace
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001}
    volumes:
      - ./frontend:/workspace
    command: sh -c "echo 'Frontend skeleton container is running. Replace frontend/Dockerfile and add your frontend project files when stack is selected.' && sleep infinity"

volumes:
  mysql_data:
