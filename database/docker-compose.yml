services:
  mysql:
    image: mysql:8.0
    container_name: student_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: student_db
    ports:
      - "3307:3306"
    volumes:
      - ./init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./init/02_data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
